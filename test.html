<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Gemini API Test</title>
<style>
body{font-family:monospace;background:#111;color:#fff;padding:40px;max-width:600px;margin:0 auto;}
input{width:100%;padding:12px;background:#222;border:1px solid #444;color:#fff;border-radius:8px;font-size:14px;margin:10px 0;}
button{padding:12px 24px;background:#00d4ff;color:#000;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:bold;}
#result{margin-top:20px;padding:16px;background:#1a1a2e;border-radius:8px;border:1px solid #333;min-height:60px;line-height:1.8;font-size:13px;}
.ok{color:#00ff88;} .err{color:#ff3366;}
</style>
</head>
<body>
<h2>🔑 Gemini API Key Tester</h2>
<p style="color:#888;font-size:13px;">Apni API key paste karo aur test karo</p>
<input id="key" type="text" placeholder="AIza...your key here"/>
<button onclick="test()">🧪 Test Karo</button>
<div id="result">Result yahan aayega...</div>

<script>
async function test(){
  const key = document.getElementById('key').value.trim();
  if(!key){document.getElementById('result').innerHTML='<span class="err">Key daalo pehle!</span>';return;}
  document.getElementById('result').innerHTML = 'Testing...';
  
  const models = [
    'gemini-1.5-flash',
    'gemini-1.5-pro', 
    'gemini-pro',
    'gemini-2.0-flash-exp'
  ];
  
  let html = '';
  for(const model of models){
    try{
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{text:'Say: WORKING'}]}]})
      });
      const data = await res.json();
      if(data.candidates?.[0]){
        html += `<div class="ok">✅ ${model} — WORKS!</div>`;
      } else {
        html += `<div class="err">❌ ${model} — ${data.error?.message||'Failed'}</div>`;
      }
    }catch(e){
      html += `<div class="err">❌ ${model} — Network Error</div>`;
    }
    document.getElementById('result').innerHTML = html + '<br/>Testing...';
    await new Promise(r=>setTimeout(r,500));
  }
  document.getElementById('result').innerHTML = html;
}
</script>
</body>
</html>
